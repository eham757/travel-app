services:
  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - 80:4200

  backend:
    build:
      context: ./be/travel-app-api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=travelapp;Username=travelapp;Password=travelapp
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8080:8080

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: travelapp
      POSTGRES_USER: travelapp
      POSTGRES_PASSWORD: travelapp
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelapp -d travelapp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:

