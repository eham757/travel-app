@if (locationNode(); as node) {
    <li [class.selected]="isSelected()" (click)="onLocationClick()?.(node)">{{ node?.name }}</li>
    <ul>
        @for (child of node?.children; track child) {
            <app-location-node [locationNode]="child" [onLocationClick]="onLocationClick()"></app-location-node>
        }
    </ul>
}
